# application-test.properties

spring.application.name=jobApp-test

# Configurazione del database per i test (potresti voler usare un database di test separato o in-memory)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:testdb}
spring.datasource.username=${POSTGRES_USER:testuser}
spring.datasource.password=${POSTGRES_PASSWORD:testpassword}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.default_schema=public

# Impostazioni Hibernate per i test
spring.jpa.hibernate.ddl-auto=create-drop  # Crea e distrugge il DB nei test (opzione utile per testare la creazione)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configurazione della porta del server (puoi scegliere una porta diversa per evitare conflitti durante i test)
server.port=5001
